# aaPanel Apache reverse proxy for UPIPays (upays.in)
# Install: copy to panel vhost extension, e.g.:
#   /www/server/panel/vhost/apache/extension/upays.in/proxy.conf
#
# Go app listens on 127.0.0.1:8091 (see payment-hub/.env APP_PORT)

<IfModule mod_proxy.c>
    ProxyPreserveHost On
    ProxyRequests Off

    ProxyPass        / http://127.0.0.1:8091/
    ProxyPassReverse / http://127.0.0.1:8091/
</IfModule>

